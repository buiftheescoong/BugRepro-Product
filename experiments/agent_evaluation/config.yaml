common:
  root_url: "http://qairline.ui-testing.io.vn"  
  max_steps: 66
  temperature: 0.2
  headless: false
  screenshots_dir: "../data/screenshots"
  screenshot_map: "../data/screenshot_map.json"
  bug_corpus: "../data/bug_corpus_full.json"

db_reset:
  enabled: true
  hosts: ["qairline.ui-testing.io.vn"]
  mongo_uri_env: "QAIRLINE_MONGO_URI"
  database_env: "QAIRLINE_DB_NAME"
  fixture_dir: "../data/qairline_seed"
  exclude_collections: []
  drop_extra_collections: true
  fail_on_error: true

execution:
  unattended: false
  need_input_skip_log: "./need_input_skips.jsonl"
  remove_skipped_run_log: true

planner_ablation:
  critic_enabled: false
  rag_enabled: false
  bug_ids: [1, 4, 6, 8, 9, 11, 13, 15, 16, 25, 29, 30, 34, 39, 40, 41, 43, 46, 51, 65, 71, 73, 75, 79, 80, 81, 83, 84, 86, 88, 91, 96, 97, 98, 99]
  models:
    - "gemini-2.5-flash"
    - "gemini-3.1-flash-lite"
    - "gpt-5.4-mini"
    - "gpt-5.4-nano"
    - "qwen3.5-9b"
    - "qwen3.5-397b-a17b"
    - "gemma-4-31b-it"
  results_dir: "../results/planner_ablation"

critic_ablation:
  planner_model: gemini-2.5-flash   
  rag_enabled: false
  bug_ids: [1, 4, 6, 8, 9, 11, 13, 15, 16, 25, 29, 30, 34, 39, 40, 41, 43, 46, 51, 65, 71, 73, 75, 79, 80, 81, 83, 84, 86, 88, 91, 96, 97, 98, 99]  # Same 35 bugs as planner_ablation
  critic_models:
    - "gemini-2.5-flash"
    - "gemini-2.5-flash-lite"
    - "gemma-4-31b-it"
    - "qwen3.5-9b"
    - "gemini-3.1-flash-lite"
    - "gpt-4.1-mini"
  results_dir: "../results/critic_ablation"

full_system:
  planner_model: gemini-2.5-flash 
  critic_model: gemini-2.5-flash 
  bug_ids: []        # Run on all bugs in the corpus
  configs:
    - name: "planner_only"
      critic_enabled: false
      rag_enabled: false
    - name: "planner_rag"
      critic_enabled: false
      rag_enabled: true
      rag_memory_dir: "./data/chroma_db_planner_rag"
      rag_search_k: 3
      rag_min_similarity: 0.72
      rag_max_success_cases: 1
    - name: "planner_critic"
      critic_enabled: true
      rag_enabled: false
    - name: "full"
      critic_enabled: true
      rag_enabled: true
      rag_memory_dir: "./data/chroma_db_planner_rag_critic"
      rag_search_k: 3
      rag_min_similarity: 0.72
      rag_max_success_cases: 1
  results_dir: "../results/full_system"

